upstream fitness_frontend {
    server fitness-frontend:80;
}

upstream fitness_backend {
    server fitness-backend:8080;
}

server {
    listen 80;
    server_name zzzhou.cn www.zzzhou.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name zzzhou.cn www.zzzhou.cn;

    ssl_certificate /etc/nginx/cert/cert-fitness/zzzhou.cn.pem;
    ssl_certificate_key /etc/nginx/cert/cert-fitness/zzzhou.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location = /api/chat/send/stream {
        proxy_pass http://fitness_backend/api/chat/send/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Content-Type;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        gzip off;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    location /api/ {
        proxy_pass http://fitness_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Content-Type;
    }

    location / {
        proxy_pass http://fitness_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
