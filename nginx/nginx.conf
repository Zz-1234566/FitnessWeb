worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_min_length 1k;
    gzip_buffers 4 16k;
    gzip_http_version 1.1;
    gzip_comp_level 6;
    gzip_types
      text/plain
      text/css
      application/json
      application/javascript
      application/x-javascript
      text/javascript
      application/xml
      image/svg+xml;
    gzip_vary on;
    gzip_proxied any;

    include /etc/nginx/conf.d/*.conf;
}
