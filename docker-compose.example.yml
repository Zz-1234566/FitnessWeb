services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: fitness_web
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chroma-data:/chroma/chroma
    restart: always

  backend:
    build: ./backend
    container_name: fitness-backend
    volumes:
      - ./videos:/root/fitness_web/videos
    depends_on:
      - mysql
      - chroma
    expose:
      - "8080"
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - QWEN_API_KEY=${QWEN_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GLM_API_KEY=${GLM_API_KEY}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - COS_SECRET_ID=${COS_SECRET_ID}
      - COS_SECRET_KEY=${COS_SECRET_KEY}
    networks:
      - default
      - web

  frontend:
    build: ./frontend
    container_name: fitness-frontend
    depends_on:
      - backend
    expose:
      - "80"
    restart: always
    networks:
      - web

volumes:
  mysql-data:
  chroma-data:

networks:
  web:
    external: true
